# NRAPA Docker Stack for Portainer
# Deploy via Portainer > Stacks > Add Stack

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nrapa-app:latest
    container_name: nrapa-app
    restart: unless-stopped
    environment:
      - APP_NAME=NRAPA
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-https://members.nrapa.co.za}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-nrapa}
      - DB_USERNAME=${DB_USERNAME:-nrapa}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      # Mail Settings
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@nrapa.co.za}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-NRAPA}
      # S3/MinIO Storage
      - FILESYSTEM_DISK=s3
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-nrapa}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=${MINIO_BUCKET:-nrapa}
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      # NTFY Notifications
      - NTFY_URL=${NTFY_URL:-https://ntfy.sh}
      - NTFY_DEVELOPER_TOPIC=${NTFY_DEVELOPER_TOPIC}
      # Livewire temp uploads go to public disk (avoids CORS issues with S3/R2)
      - LIVEWIRE_TEMPORARY_FILE_UPLOAD_DISK=public
    volumes:
      - app-logs:/var/www/html/storage/logs
    ports:
      - "8085:80"
    networks:
      - nrapa-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: nrapa-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-nrapa}
      - MYSQL_USER=${DB_USERNAME:-nrapa}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - nrapa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: nrapa-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - nrapa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: nrapa-minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-nrapa}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - nrapa-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initialization (runs once)
  minio-init:
    image: minio/mc:latest
    container_name: nrapa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - nrapa-network
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-nrapa}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET:-nrapa}
    entrypoint: /bin/sh -c "mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && mc mb myminio/$$MINIO_BUCKET --ignore-existing && mc anonymous set download myminio/$$MINIO_BUCKET/public && exit 0"

  # Scheduler for cron jobs
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: nrapa-app:latest
    container_name: nrapa-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php /var/www/html/artisan schedule:run --verbose --no-interaction & sleep 60; done"
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-nrapa}
      - DB_USERNAME=${DB_USERNAME:-nrapa}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-nrapa}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=${MINIO_BUCKET:-nrapa}
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - NTFY_URL=${NTFY_URL:-https://ntfy.sh}
      - NTFY_DEVELOPER_TOPIC=${NTFY_DEVELOPER_TOPIC}
      - LIVEWIRE_TEMPORARY_FILE_UPLOAD_DISK=public
    volumes:
      - app-logs:/var/www/html/storage/logs
    networks:
      - nrapa-network
    depends_on:
      - app
      - db
      - redis

  # Queue worker for background jobs
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: nrapa-app:latest
    container_name: nrapa-queue
    restart: unless-stopped
    command: php /var/www/html/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-nrapa}
      - DB_USERNAME=${DB_USERNAME:-nrapa}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-nrapa}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=${MINIO_BUCKET:-nrapa}
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@nrapa.co.za}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-NRAPA}
      - LIVEWIRE_TEMPORARY_FILE_UPLOAD_DISK=public
    volumes:
      - app-logs:/var/www/html/storage/logs
    networks:
      - nrapa-network
    depends_on:
      - app
      - db
      - redis

networks:
  nrapa-network:
    driver: bridge

volumes:
  app-logs:
  db-data:
  redis-data:
  minio-data:
