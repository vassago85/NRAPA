name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Git
        env:
          GIT_TERMINAL_PROMPT: 0
          GIT_ASKPASS: echo
        run: |
          git config --global --add safe.directory '*'
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git config --global init.defaultBranch main

      - name: Add Flux Credentials Loaded From ENV
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.FLUX_USERNAME }}" ] && [ -n "${{ secrets.FLUX_LICENSE_KEY }}" ]; then
            composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
          else
            echo "Flux credentials not set, skipping..."
          fi

      - name: Clear Composer Cache
        run: composer clear-cache || true

      - name: Install Dependencies
        env:
          GIT_TERMINAL_PROMPT: 0
          GIT_ASKPASS: echo
          COMPOSER_DISABLE_XDEBUG_WARN: 1
          COMPOSER_PREFER_DIST: 1
        run: |
          echo "=== Composer Version ==="
          composer --version
          echo "=== Git Version ==="
          git --version
          echo "=== Checking composer.json ==="
          cat composer.json | head -30
          echo "=== Starting composer install (dist-only, using --prefer-dist flag and COMPOSER_PREFER_DIST env) ==="
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts -vvv 2>&1 | tee composer-install.log || {
            echo "=== Composer install failed ==="
            echo "=== Last 50 lines of output ==="
            tail -50 composer-install.log || true
            echo "=== Composer diagnose ==="
            composer diagnose || true
            echo "=== Checking for git-related packages ==="
            composer show --installed 2>&1 | grep -i git || echo "No git packages found"
            exit 1
          }
          echo "=== Running composer scripts ==="
          composer run-script post-autoload-dump || true
          echo "=== Composer install succeeded ==="

      - name: Install Node Dependencies
        run: npm i

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: |
          echo "=== Node Version ==="
          node --version
          echo "=== NPM Version ==="
          npm --version
          echo "=== Checking if vendor directory exists ==="
          ls -la vendor/livewire 2>&1 || echo "vendor/livewire directory not found"
          echo "=== Starting build ==="
          npm run build

      - name: Run Tests
        run: ./vendor/bin/pest
