# Invoice Ninja v5 - BC Safaris
# Separate instance for BC Safaris business
#
# Usage:
#   cd /opt/invoice-ninja-bcsafaris
#   cp env.template .env
#   # Edit .env with your values
#   docker compose up -d
#
# Access: https://invoice.bcsafaris.africa (after NPM proxy setup)

services:
  invoiceninja:
    image: invoiceninja/invoiceninja:5
    container_name: bcsafaris-invoiceninja-app
    restart: unless-stopped
    environment:
      - APP_URL=${IN_APP_URL:-https://invoice.bcsafaris.africa}
      - APP_KEY=${IN_APP_KEY}
      - APP_DEBUG=${IN_APP_DEBUG:-false}
      - REQUIRE_HTTPS=true
      - TRUSTED_PROXIES=*
      - DB_HOST=bcsafaris-invoiceninja-db
      - DB_PORT=3306
      - DB_DATABASE=${IN_DB_DATABASE:-invoiceninja}
      - DB_USERNAME=${IN_DB_USERNAME:-invoiceninja}
      - DB_PASSWORD=${IN_DB_PASSWORD}
      - MAIL_MAILER=${IN_MAIL_MAILER:-smtp}
      - MAIL_HOST=${IN_MAIL_HOST}
      - MAIL_PORT=${IN_MAIL_PORT:-587}
      - MAIL_USERNAME=${IN_MAIL_USERNAME}
      - MAIL_PASSWORD=${IN_MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${IN_MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${IN_MAIL_FROM_ADDRESS:-invoices@bcsafaris.africa}
      - MAIL_FROM_NAME=${IN_MAIL_FROM_NAME:-BC Safaris}
    volumes:
      - bcsafaris-in-public:/var/www/app/public
      - bcsafaris-in-storage:/var/www/app/storage
    depends_on:
      bcsafaris-invoiceninja-db:
        condition: service_healthy
    networks:
      - bcsafaris-invoiceninja-network

  bcsafaris-invoiceninja-nginx:
    image: nginx:alpine
    container_name: bcsafaris-invoiceninja-nginx
    restart: unless-stopped
    volumes:
      - bcsafaris-in-public:/var/www/app/public:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    depends_on:
      - invoiceninja
    networks:
      - bcsafaris-invoiceninja-network
      - npm-network

  bcsafaris-invoiceninja-db:
    image: mariadb:11
    container_name: bcsafaris-invoiceninja-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${IN_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${IN_DB_DATABASE:-invoiceninja}
      - MYSQL_USER=${IN_DB_USERNAME:-invoiceninja}
      - MYSQL_PASSWORD=${IN_DB_PASSWORD}
    volumes:
      - bcsafaris-in-db-data:/var/lib/mysql
    networks:
      - bcsafaris-invoiceninja-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cron job for recurring invoices and reminders
  bcsafaris-invoiceninja-cron:
    image: invoiceninja/invoiceninja:5
    container_name: bcsafaris-invoiceninja-cron
    restart: unless-stopped
    command: sh -c "while true; do php /var/www/app/artisan schedule:run --verbose --no-interaction; sleep 60; done"
    environment:
      - APP_URL=${IN_APP_URL:-https://invoice.bcsafaris.africa}
      - APP_KEY=${IN_APP_KEY}
      - DB_HOST=bcsafaris-invoiceninja-db
      - DB_PORT=3306
      - DB_DATABASE=${IN_DB_DATABASE:-invoiceninja}
      - DB_USERNAME=${IN_DB_USERNAME:-invoiceninja}
      - DB_PASSWORD=${IN_DB_PASSWORD}
    volumes:
      - bcsafaris-in-public:/var/www/app/public
      - bcsafaris-in-storage:/var/www/app/storage
    depends_on:
      - invoiceninja
    networks:
      - bcsafaris-invoiceninja-network

networks:
  bcsafaris-invoiceninja-network:
    driver: bridge
  npm-network:
    external: true
    name: nginx-proxy-manager_default

volumes:
  bcsafaris-in-public:
  bcsafaris-in-storage:
  bcsafaris-in-db-data:
